# Coding Standard — 项目级配置
# 放到项目根目录，本 Skill 自动读取并应用
# 不改也可以——默认全部规则生效，全部为默认严重度

version: 1

# ── 禁用规则 ──────────────────────────────────────────
disable: []

# ── 严重度调整 ────────────────────────────────────────
severity: {}

# ── 忽略路径 ──────────────────────────────────────────
ignore:
  - "**/*.generated.*"
  - "**/vendor/**"
  - "**/migrations/**"

# ── 聚焦模式 (非空 = 只看这些，空 = 全检查) ──────────
focus: []

# ── 抑制项 ────────────────────────────────────────────
suppress: []

# ── 自定义规则 ────────────────────────────────────────
custom_rules: []
